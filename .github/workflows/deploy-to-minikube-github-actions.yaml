name: Deploy to Minikube using GitHub Actions

on: [push]
  
jobs:
  job1:
    runs-on: ubuntu-latest
    name: build Node.js Docker Image and deploy to minikube
    steps:
    - uses: actions/checkout@v2
    - name: Start minikube
      uses: medyagh/setup-minikube@master
    - name: Try the cluster !
      run: kubectl get pods -A
    - name: Build image
      run: |
          export SHELL=/bin/bash
          eval $(minikube -p minikube docker-env)
          docker build -f ./Dockerfile -t devopshint/node-app:latest .
          echo -n "verifying images:"
          docker images         
    - name: Deploy to minikube
      run:
        kubectl apply -f k8s-node-app.yaml
    # 🔍 Add this step to catch the error logs!
    - name: Debug Kubernetes Resources
      if: always()
      run: |
        echo "=== ALL PODS ==="
        kubectl get pods -A
        echo "=== DEPLOYMENT DESCRIBE ==="
        kubectl describe deployment nodejs-app
        echo "=== POD LOGS ==="
        kubectl logs -l app=nodejs-app --all-containers=true --tail=50 || echo "No logs available"

    - name: Test service URLs
      run: |
          minikube service list
          minikube service nodejs-app --url
    - name: Test service URLs
      run: |
          minikube service list
          minikube service nodejs-app --url

